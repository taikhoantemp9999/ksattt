<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Khảo sát ATTT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        .detail-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            border-bottom: 1px solid #f1f5f9;
            padding: 12px 0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            width: 250px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .detail-value {
            color: var(--text-main);
            flex-grow: 1;
        }

        .section-header {
            background: var(--primary-light);
            color: var(--primary);
            padding: 12px 16px;
            border-radius: 8px;
            margin: 24px 0 16px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: var(--text-muted);
            color: white;
            padding: 8px 16px;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-yes { background: #dcfce7; color: #166534; }
        .status-no { background: #fee2e2; color: #991b1b; }

        @media (max-width: 640px) {
            .detail-row {
                flex-direction: column;
            }
            .detail-label {
                width: 100%;
                margin-bottom: 4px;
            }
        }

        .print-btn {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
        }

        @media print {
            .back-btn, .print-btn {
                display: none;
            }
            body {
                background: white;
            }
            .app-container {
                max-width: 100%;
                padding: 0;
            }
            .detail-card {
                box-shadow: none;
                border: 1px solid #eee;
            }
        }

        /* Building & Equipment Table Styles */
        .building-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 0.95rem;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .building-table th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        .building-table td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        .building-table tr:last-child td {
            border-bottom: none;
        }

        .building-table tr:hover {
            background: #fdfdfd;
        }

        .node-header {
            font-weight: 700;
            color: #334155;
            margin: 20px 0 10px 0;
            padding-left: 10px;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 4px;
        }

        .tag-isp { background: #e0f2fe; color: #0369a1; }
        .tag-main { background: #f3e8ff; color: #7e22ce; }
    </style>
</head>

<body>
    <div class="app-container">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <button onclick="window.close()" class="back-btn">Đóng trang</button>
            <button onclick="window.print()" class="print-btn">In trang</button>
        </div>

        <header class="app-header">
            <div class="header-content">
                <h1 id="customerName">Chi tiết Khảo sát</h1>
                <p id="surveyTime">Đang tải dữ liệu...</p>
            </div>
        </header>

        <div id="detailContent">
            <!-- Data will be rendered here -->
            <div class="empty-state">Đang tải dữ liệu từ server...</div>
        </div>
    </div>

    <script src="detail.js"></script>
</body>

</html>
