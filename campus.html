<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bố trí tòa nhà</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <script src="auth.js?v=20260317"></script>

    <style>
        .campus-header {
            display:flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .campus-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 900;
        }
        .campus-actions {
            display:flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .campus-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: #334155;
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
        }
        .campus-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .canvas-wrap {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .canvas {
            position: relative;
            height: min(72vh, 720px);
            background:
                linear-gradient(#f1f5f9 1px, transparent 1px),
                linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
            background-size: 24px 24px;
            background-color: #ffffff;
            touch-action: none;
        }

        .toolbar {
            display:flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 12px 0;
            align-items: center;
        }
        .tool-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: #334155;
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
        }
        .tool-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .tool-btn.active {
            background: #0f172a;
            border-color: #0f172a;
            color: #fff;
        }

        .link-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .building-block {
            position: absolute;
            width: 160px;
            min-height: 92px;
            height: auto;
            border-radius: 14px;
            border: 2px solid rgba(79,70,229,0.25);
            background: #EEF2FF;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
            cursor: grab;
            user-select: none;
            display:flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 12px;
            z-index: 2;
        }
        .building-block:active { cursor: grabbing; }
        .building-name {
            font-weight: 900;
            color: #1e293b;
            line-height: 1.15;
            word-break: break-word;
        }
        .building-sub {
            margin-top: 6px;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 700;
        }
        .building-note {
            margin-top: 8px;
            font-size: 0.78rem;
            color: #334155;
            font-weight: 800;
            background: rgba(255,255,255,0.7);
            border: 1px dashed rgba(79,70,229,0.25);
            padding: 6px 8px;
            border-radius: 10px;
            white-space: pre-wrap;
            line-height: 1.25;
            overflow: visible;
        }

        .gate {
            position: absolute;
            left: 12px;
            bottom: 12px;
            width: 170px;
            height: 64px;
            border-radius: 14px;
            border: 2px dashed rgba(2,132,199,0.6);
            background: rgba(2,132,199,0.08);
            display:flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #0284c7;
            user-select: none;
            cursor: grab;
            touch-action: none;
            z-index: 3;
        }
        .gate:active { cursor: grabbing; }

        .net-node {
            position: absolute;
            width: 150px;
            height: 64px;
            border-radius: 14px;
            border: 2px solid rgba(15, 23, 42, 0.12);
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.10);
            cursor: grab;
            user-select: none;
            padding: 10px 12px;
            display:flex;
            flex-direction: column;
            justify-content: center;
            z-index: 4;
        }
        .net-node:active { cursor: grabbing; }
        .net-node .delete-x {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 28px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid #fecaca;
            background: #fee2e2;
            color: #991b1b;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            pointer-events: auto;
        }
        .net-title {
            font-weight: 900;
            color: #0f172a;
            line-height: 1.1;
        }
        .net-kind {
            display: none;
        }
        .net-node.isp { border-color: rgba(2,132,199,0.45); background: rgba(2,132,199,0.06); }
        .net-node.lb { border-color: rgba(249,115,22,0.45); background: rgba(249,115,22,0.06); }
        .net-node.core { border-color: rgba(147,51,234,0.45); background: rgba(147,51,234,0.06); }
        .net-node.selected {
            outline: 3px solid rgba(79,70,229,0.35);
            outline-offset: 2px;
        }

        .hint {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .hint b { color: #334155; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>Bố trí vị trí các tòa nhà</h1>
                <p id="customerLabel">Đang tải...</p>
            </div>
        </header>

        <main>
            <div id="surveyNoteCard" class="detail-card" style="display:none; margin-bottom: 12px;">
                <div style="font-weight: 900; color: var(--primary); margin-bottom: 8px;">V. Ghi chú khảo sát</div>
                <div id="surveyNoteText" style="white-space: pre-wrap; line-height: 1.55; color: #334155;">-</div>
            </div>

            <div class="campus-header">
                <h2>Mặt bằng tổng quan</h2>
                <div class="campus-actions">
                    <button id="btnBack" class="campus-btn" type="button">← Về danh sách</button>
                    <button id="btnReset" class="campus-btn" type="button">Reset bố trí</button>
                    <button id="btnSave" class="campus-btn primary" type="button">Lưu</button>
                </div>
            </div>

            <div class="toolbar">
                <button id="btnAddISP" class="tool-btn" type="button">+ Đường truyền Internet</button>
                <button id="btnAddLB" class="tool-btn" type="button">+ Cân bằng tải</button>
                <button id="btnDrawLink" class="tool-btn primary" type="button">Chế độ vẽ dây: TẮT</button>
                <button id="btnDeleteLink" class="tool-btn" type="button">Chế độ xóa dây: TẮT</button>
                <button id="btnClearLinks" class="tool-btn" type="button">Xóa tất cả dây</button>
            </div>

            <div class="canvas-wrap">
                <div id="canvas" class="canvas">
                    <svg id="linkLayer" class="link-layer"></svg>
                    <div id="gate" class="gate">🚪 CỔNG VÀO</div>
                </div>
            </div>

            <div class="hint">
                - Kéo thả các tòa nhà để bố trí vị trí.<br/>
                - Bạn cũng có thể kéo thả <b>Cổng vào</b> để đặt vị trí theo thực tế.<br/>
                - Bật <b>Chế độ vẽ dây</b>, rồi chạm lần lượt 2 node mạng để nối.
            </div>
        </main>
    </div>

    <script src="campus.js?v=20260317_10"></script>
</body>
</html>
